name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run against the built app — catches breakage from external
    # changes (dawum payload shifts, dep drift) without a code push. 04:17 UTC
    # avoids the top-of-hour runner contention.
    - cron: "17 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: check
    # The frontend now reads from Postgres (Phase 2), so the built app needs a
    # reachable, migrated DB at build + runtime. The DB stays empty here — the
    # data-dependent specs are empty-tolerant and skip themselves.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wahlumfragen
          POSTGRES_PASSWORD: wahlumfragen
          POSTGRES_DB: wahlumfragen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wahlumfragen -d wahlumfragen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://wahlumfragen:wahlumfragen@localhost:5432/wahlumfragen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Re-use the incremental Next build cache across runs; bust it when
          # deps or any source file changes so we never serve a stale build.
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx,css}', 'app/**/*.{ts,tsx,js,jsx,css}') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
