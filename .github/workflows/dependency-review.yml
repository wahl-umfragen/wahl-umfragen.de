name: Dependency review

# Blocks PRs that introduce dependencies with known vulnerabilities or
# license terms incompatible with this ODbL/MIT project. Only runs on PRs —
# the action diffs the PR's dependency manifest against the base branch.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the check on moderate+ severity vulnerabilities.
          fail-on-severity: moderate
          # Disallow copyleft licenses that would conflict with shipping this
          # app. Adjust if a needed dependency uses one of these.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-3.0
          comment-summary-in-pr: on-failure
