name: Dependabot auto-merge

# Enables auto-merge on low-risk Dependabot PRs. The actual gate is branch
# protection on `main` (required status checks) plus the repo "Allow
# auto-merge" setting: this workflow only *requests* auto-merge, and GitHub
# performs the merge once the required CI checks pass. Higher-risk bumps
# (production major versions) deliberately fall through and stay open for
# manual review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only ever act on Dependabot's own PRs.
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for low-risk updates
        # patch / minor (any dependency), OR any major for GitHub Actions or
        # dev dependencies. Production major bumps are intentionally excluded
        # and left for a human to review the changelog (e.g. nodemailer 8->9).
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          (steps.meta.outputs.update-type == 'version-update:semver-major' &&
           (steps.meta.outputs.package-ecosystem == 'github_actions' ||
            steps.meta.outputs.dependency-type == 'direct:development'))
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
