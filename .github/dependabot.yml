version: 2
updates:
  # npm dependencies (package.json / package-lock.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: build
      prefix-development: chore
      include: scope
    # Group low-risk updates into single PRs to cut review noise. Major bumps
    # stay as individual PRs so breaking changes get reviewed on their own.
    groups:
      production-minor-patch:
        applies-to: version-updates
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # eslint 10 breaks eslint-config-next's bundled eslint-plugin-react
      # (the rule context API dropped context.getFilename()). Stay on 9.x until
      # eslint-config-next ships support for eslint 10.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  # GitHub Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
